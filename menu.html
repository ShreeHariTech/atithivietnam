<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FAVICON -->
<link rel="icon" href="favicon.ico">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="Logo.png">

<title>Atithi Menu</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #EBE0C4;
}

object, embed{
  width:100%;
  height:100%;
}
/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 65px;
  background: #EBE0C4;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  z-index: 1000;
}

.logo img {
  height: 55px;
}

.download-btn {
  background: #8B0000;
  color: white;
  padding: 8px 14px;
  text-decoration: none;
  border-radius: 6px;
  font-size: 14px;
}

/* VIEWER */
.viewer {
  margin-top: 65px;
  height: calc(100vh - 65px);
}

.menu-img{
  width:100%;
  height:auto;
  display:block;
  margin-bottom: 10px;
}

/* PDF */
iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* iOS fallback */
.ios-fallback {
  display: none;
  text-align: center;
  padding: 40px;
}

.ios-fallback a {
  background: #8B0000;
  color: white;
  padding: 12px 20px;
  text-decoration: none;
  border-radius: 6px;
  font-size: 16px;
}

/* MOBILE */
@media (max-width: 768px) {
  .header {
    height: 55px;
    padding: 0 12px;
  }

  .logo img {
    height: 45px;
  }

  .download-btn {
    padding: 6px 10px;
    font-size: 12px;
  }

  .viewer {
    margin-top: 55px;
    height: calc(100vh - 55px);
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <a href="index.html">
      <img src="Logo.png" alt="Logo">
    </a>
  </div>

  <a href="menu.pdf" download class="download-btn">⬇ Download</a>
</div>

<div class="viewer">

  <img src="pages/1.jpg" class="menu-img">
  <img src="pages/2.jpg" class="menu-img">
  <img src="pages/3.jpg" class="menu-img">
  <img src="pages/4.jpg" class="menu-img">
  <img src="pages/5.jpg" class="menu-img">
  <img src="pages/6.jpg" class="menu-img">
  <img src="pages/7.jpg" class="menu-img">
  <img src="pages/8.jpg" class="menu-img">
  <img src="pages/9.jpg" class="menu-img">
  <img src="pages/10.jpg" class="menu-img">
  <img src="pages/11.jpg" class="menu-img">
  <img src="pages/12.jpg" class="menu-img">
  <img src="pages/13.jpg" class="menu-img">
  <img src="pages/14.jpg" class="menu-img">
  <img src="pages/15.jpg" class="menu-img">
  <img src="pages/16.jpg" class="menu-img">
  <img src="pages/17.jpg" class="menu-img">
  <img src="pages/18.jpg" class="menu-img">
  <img src="pages/19.jpg" class="menu-img">
  
</div>



</body>
</html>
